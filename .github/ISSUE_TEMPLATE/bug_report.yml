name: Bug report
description: Report a reproducible problem in Voxio
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Launch Voxio
        2. Start dictation
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Include Voxio commit/version, backend choice, model, and any relevant environment variables.
      placeholder: |
        Commit: ...
        Local backend: ...
        Model: ...
        OPENAI_API_KEY configured: yes/no

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste only non-sensitive logs. Remove keys, tokens, and personal data first.
